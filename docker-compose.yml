version: '3.8'

services:
  gateway:
    # 使用本地 Dockerfile 构建
    build:
      context: .
      dockerfile: Dockerfile
    
    container_name: anthropic-openai-gateway
    restart: unless-stopped
    
    ports:
      - "3456:3456"  # 暴露网关端口
    
    environment:
      LISTEN_HOST: "0.0.0.0"
      LISTEN_PORT: "3456"
      OPENAI_BASE_URL: "https://api.openai.com/v1"
      OPENAI_API_KEY: "${OPENAI_API_KEY}"  # 从 .env 文件读取
      OPENAI_TIMEOUT_MS: "120000"
      ANTHROPIC_BASE_URL: "https://api.anthropic.com/v1"  # 未命中转换列表的模型会透传到这里
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"  # 透传模式使用
      ANTHROPIC_TIMEOUT_MS: "120000"
      MODELS_NEED_TRANSFORMATION: "gpt-4.1,gpt-4o,gpt-4o-mini,gpt-4.1-mini,gpt-4.1-nano,gpt-5,o3,o3-mini,o4-mini"
    
    # 网络配置（可选）
    networks:
      - gateway-network
    
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# 定义网络
networks:
  gateway-network:
    driver: bridge
